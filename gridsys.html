<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box {
            background-color: #0d6efd;
            color: white;
            text-align: center;
            padding: 20px;
            border: 2px solid white;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Bootstrap Grid System Example</h2>

    <!-- Row 1 -->
    <div class="row mb-3">
        <div class="col box">Column 1</div>
        <div class="col box">Column 2</div>
        <div class="col box">Column 3</div>
    </div>

    <!-- Row 2 -->
    <div class="row mb-3">
        <div class="col-4 box">col-4</div>
        <div class="col-8 box">col-8</div>
    </div>

    <!-- Row 3 -->
    <div class="row mb-3">
        <div class="col-3 box">col-3</div>
        <div class="col-3 box">col-3</div>
        <div class="col-3 box">col-3</div>
        <div class="col-3 box">col-3</div>
    </div>

    <!-- Responsive Grid -->
    <div class="row">
        <div class="col-md-6 col-lg-4 box">Box 1</div>
        <div class="col-md-6 col-lg-4 box">Box 2</div>
        <div class="col-md-12 col-lg-4 box">Box 3</div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!--
col-6 + col-6 = 12
col-4 + col-4 + col-4 = 12
col-3 + col-3 + col-3 + col-3 = 12
col-2 + col-10 = 12-->
