<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Card Example</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card" style="width: 22rem;">

        <img src="https://picsum.photos/350/200"
            class="card-img-top"
            alt="Sample Image">

        <div class="card-body">

            <h5 class="card-title">Laptop</h5>

            <p class="card-text">
                This is a sample Bootstrap card with an image,
                title, description, and a button.
            </p>

            <a href="#" class="btn btn-primary">
                Buy Now
            </a>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!--
card → Creates the card container.
card-img-top → Displays the image at the top of the card.
card-body → Contains the content of the card.
card-title → Styles the card heading.
card-text → Styles the description text.
btn btn-primary → Creates a blue Bootstrap button.
container mt-5 → Centers the content with a top margin.-->
