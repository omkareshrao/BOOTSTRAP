<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" href="#">MyWebsite</a>

        <!-- Hamburger Button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>

                <!-- Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">
                        More
                    </a>

                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Gallery</a></li>
                        <li><a class="dropdown-item" href="#">Blog</a></li>
                        <li><a class="dropdown-item" href="#">FAQ</a></li>
                    </ul>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Page Content -->
<div class="container mt-5">
    <h2>Responsive Bootstrap Navbar</h2>
    <p>
        Resize the browser window. On smaller screens, the navigation
        menu collapses into a hamburger icon.
    </p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!--
navbar → Creates the navigation bar.
navbar-expand-lg → Expands the navbar on large screens and collapses it on smaller screens.
navbar-dark bg-dark → Applies a dark theme and dark background.
container → Centers and spaces the navbar content.
navbar-brand → Styles the website or company name.
navbar-toggler → Creates the hamburger button.
navbar-toggler-icon → Displays the hamburger icon.
collapse navbar-collapse → Makes the menu collapsible.
navbar-nav → Creates the navigation list.
nav-item → Defines each navigation item.
nav-link → Styles the navigation links.
ms-auto → Pushes the menu items to the right.
dropdown, dropdown-toggle, dropdown-menu, dropdown-item → Creates a dropdown menu.-->
