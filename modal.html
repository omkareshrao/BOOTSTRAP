<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Modal Example</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container text-center mt-5">
        <h1>Bootstrap Modal Example</h1>
        <p>Click the button below to open a Bootstrap modal.</p>

        <button class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal">
            Open Modal
        </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- Modal Header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Welcome!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Modal Body -->
                <div class="modal-body">
                    <p>This is a simple Bootstrap 5 modal popup.</p>
                    <p>You can add forms, images, or any HTML content here.</p>
                </div>

                <!-- Modal Footer -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="button" class="btn btn-primary">
                        Save Changes
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!--Bootstrap classes used:
modal → Creates the modal.
fade → Adds a fade-in/fade-out animation.
modal-dialog → Defines the modal's size and position.
modal-content → Wraps the entire modal.
modal-header → Header section of the modal.
modal-body → Main content section.
modal-footer → Footer section with action buttons.
btn-close → Close (×) button.
data-bs-toggle="modal" → Opens the modal.
data-bs-target="#exampleModal" → Links the button to the modal.
data-bs-dismiss="modal" → Closes the modal when the button is clicked.

This is the standard Bootstrap 5 modal structure and can be used as a template for login forms, alerts, confirmations, or other popup content. -->
