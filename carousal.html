<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Carousel</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
        </div>

        <!-- Carousel Images -->
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://picsum.photos/id/1015/900/400" class="d-block w-100" alt="Slide 1">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/id/1016/900/400" class="d-block w-100" alt="Slide 2">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/id/1018/900/400" class="d-block w-100" alt="Slide 3">
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#myCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>
        </button>

        <!-- Next Button -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#myCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!--carousel → Creates the carousel.
slide → Adds slide animation.
carousel-inner → Contains all the slides.
carousel-item → Represents each individual slide.
active → Marks the first slide as visible.
carousel-indicators → Adds the navigation dots.
carousel-control-prev → Previous button.
carousel-control-next → Next button.
d-block w-100 → Makes the images responsive and span the full width.-->
