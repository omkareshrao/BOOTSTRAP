<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bootstrap Styling classes Example</title>
        <!--Bootstrap CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" >
        <!--Animate.css for animations-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="container">
            <h1 class="text-center mt-4">Bootstrap Styling Classes Example</h1>

            <!-- Example of text styling classes -->
            <div class="mt-4">
                <h4>Text Styling Classes</h4>
                <p class="text-primary">This is a primary text.</p>
                <p class="text-success">This is a success text.</p>
                <p class="text-danger">This is a danger text.</p>
                <p class="text-warning">This is a warning text.</p>
                <p class="text-info">This is an info text.</p>
            </div>

            <!-- Example of background styling classes -->
            <div class="mt-4">
                <h4>Background Styling Classes</h4>
                <div class="bg-primary text-white p-2">Primary Background</div>
                <div class="bg-success text-white p-2">Success Background</div>
                <div class="bg-danger text-white p-2">Danger Background</div>
                <div class="bg-warning text-dark p-2">Warning Background</div>
                <div class="bg-info text-white p-2">Info Background</div>
            </div>

            
</html>
