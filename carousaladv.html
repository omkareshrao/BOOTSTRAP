
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousal for image sliders</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--Animate Css for Animations-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" referrerpolicy="no-referrer" />
    <style>
        .carousel-item img{
            max-height: 800px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="conatainer">
        <h1 class="text-center mt-4">Bootstrap Carousal for Image Sliders</h1>
        <p class="text-center">This is an example of a responsive image slider using Bootstrap 5.</p>

        <!-- Carousal -->
        <div id="carouselExampleIndicators" class="carousel slide mt-4" data-bs-ride="carousel">
            <ol class="carousel-indicators">
                <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0 " class="active"></li>
                <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1 "></li>
                <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2 "></li>
            </ol>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://shorturl.at/ObjKd" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>First Slide</h5>
                        <p>This is the first slide of the carousel.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://shorturl.at/TKNm3" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Second Slide</h5>
                        <p>This is the second slide of the carousel.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://shorturl.at/4Gdic" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Third Slide</h5>
                        <p>This is the third slide of the carousel.</p>
                    </div>
                </div>
            </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </a>
    </div>
</body>
</html>
